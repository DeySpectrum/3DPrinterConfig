[include timelapse.cfg]
[include mainsail.cfg]
[mcu]
serial: /dev/ttyS0
restart_method: command

[virtual_sdcard]
path: /home/mks/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

# Necessario para nivelamento adaptativo (sonda apenas a area do objeto)
[exclude_object]

[printer]
kinematics: corexy
max_velocity: 700
max_accel: 8000
max_z_velocity: 30
max_z_accel: 100
square_corner_velocity: 8.0

[stepper_x]
step_pin: PC14
dir_pin: !PC13
enable_pin: !PC15
microsteps: 16
rotation_distance: 40
full_steps_per_rotation: 200
endstop_pin: !PA14
position_min: 0 
position_endstop: 0
position_max: 230
homing_speed: 80                
homing_retract_dist: 5
step_pulse_duration: 0.000008

[stepper_y]
step_pin: PE5
dir_pin: !PE4
enable_pin: !PD14
microsteps: 16
rotation_distance: 40
full_steps_per_rotation: 200
endstop_pin: !PA15
position_min: 0
position_endstop: 0
position_max: 230
homing_speed: 80                 
homing_retract_dist: 5
step_pulse_duration: 0.000008

#Controle de corrente dos motores do eixo XY
[tmc2209 stepper_x]
uart_pin: PE6
run_current: 1.5               
hold_current: 0.5
interpolate: true
stealthchop_threshold: 0 

[tmc2209 stepper_y]
uart_pin: PE3
run_current: 1.5
hold_current: 0.5
interpolate: true
stealthchop_threshold: 0

# -------------------- Z (gantry principal) --------------------
# ATENÇÃO: Se Z descer ao homear (em vez de subir), troque dir_pin: PE0 por dir_pin: !PE0
[stepper_z]
step_pin: PE1
dir_pin: PE0 
enable_pin: !PE2
microsteps: 32                                        #Era todos os 4 motores era 16
rotation_distance: 8            
full_steps_per_rotation: 200
# Removido gear_ratio (usando lead screw direto TR8x8)
endstop_pin: probe:z_virtual_endstop
position_max: 280
position_min: -5  #Era -5
homing_speed: 5   #Era 8
second_homing_speed: 2

# Z1 (motor Z 2)
[stepper_z1]
step_pin: PD6
dir_pin: !PD5
enable_pin: !PD7
microsteps: 32
rotation_distance: 8
full_steps_per_rotation: 200

# Z2 (motor Z 3)
[stepper_z2]
step_pin: PD2
dir_pin: PD1
enable_pin: !PD3
microsteps: 32
rotation_distance: 8
full_steps_per_rotation: 200

# Z3 (motor Z 4)
[stepper_z3]
step_pin: PC7
dir_pin: PC6
enable_pin: !PC8
microsteps: 32
rotation_distance: 8
full_steps_per_rotation: 200

#Controle de corrente dos motores do eixo Z
[tmc2209 stepper_z]
uart_pin: PB7
run_current: 1.5      #A corrente de todos era 1.5          
hold_current: 0.45               
interpolate: true
stealthchop_threshold: 0

[tmc2209 stepper_z1]
uart_pin: PD4
run_current: 1.5
hold_current: 0.45
interpolate: true
stealthchop_threshold: 0

[tmc2209 stepper_z2]
uart_pin: PD0
run_current: 1.5
hold_current: 0.45
interpolate: true
stealthchop_threshold: 0

[tmc2209 stepper_z3]
uart_pin: PD15
run_current: 1.5
hold_current: 0.45
interpolate: true
stealthchop_threshold: 0

[extruder]
step_pin: PB5
dir_pin: !PB4
enable_pin: !PB6
microsteps: 16
rotation_distance: 32.5        
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
min_temp: 0
max_temp: 330
heater_pin: PB0  
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: PC0  #Era PC1 Ers PC2
max_power: 1.0
min_extrude_temp: 160              

# >>> ADIÇÃO OBRIGATÓRIA <<<
control: pid
pid_kp: 37.095
pid_ki: 2.114
pid_kd: 162.752
# <<< ADIÇÃO OBRIGATÓRIA >>>

pressure_advance: 0.000            # DESABILITADO — calibrar com TUNING_TOWER antes de habilitar
pressure_advance_smooth_time: 0.08  # 80ms — suave para Bowden (igual ao config funcionando)
max_extrude_cross_section: 20.0
max_extrude_only_distance: 200.0   # Bowden precisa de margem ampla
max_extrude_only_velocity: 150     # compativel com config funcionando
max_extrude_only_accel: 6000       # compativel com config funcionando
step_pulse_duration: 0.000004

[tmc2209 extruder]
uart_pin: PB3
run_current: 1.0
hold_current: 0.45
interpolate: true
stealthchop_threshold: 0

# -------------------- Probe --------------------
[probe]
pin: !PB15
x_offset: -6
y_offset: 6
z_offset: 2.0            
speed: 10.0
samples: 2
samples_result: median
sample_retract_dist: 5.0
samples_tolerance: 0.05
samples_tolerance_retries: 1

[heater_bed]
heater_pin: PD12
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC2
max_power: 1.0
control: pid
pid_kp: 47.0
pid_ki: 0.5
pid_kd: 300.0
min_temp: 0
max_temp: 130

# Move para o centro da cama antes de homear Z com o probe
[safe_z_home]
home_xy_position: 115, 115
speed: 250
z_hop: 10
z_hop_speed: 10

[bed_mesh]
speed: 120
horizontal_move_z: 5
mesh_min: 25,11
mesh_max: 215,215
probe_count: 5,5
algorithm: lagrange
fade_start: 1 
fade_end: 5   

# -------------------- Nivelamento automático 4 motores Z --------------------
[z_tilt]
z_positions:
    25, 10      # Frente esquerda (Z0)
    228, 10     # Frente direita (Z1)
    228, 225    # Trás direita (Z2)
    25, 225     # Trás esquerda (Z3)
points:
    25, 10
    228, 10
    228, 225
    25, 225
speed: 120
horizontal_move_z: 5
retries: 5
retry_tolerance: 0.05

[screws_tilt_adjust]
screw1: 25, 10
screw1_name: Frontal esquerdo
screw2: 228, 10
screw2_name: Frontal direito
screw3: 25, 225
screw3_name: Traseiro esquerdo
screw4: 228, 225
screw4_name: Traseiro direito
horizontal_move_z: 10
speed: 120
screw_thread: CW-M3
[gcode_macro CALCULO_DE_PARAFUSO]
gcode:
    SCREWS_TILT_CALCULATE

# Retracao por firmware (G10/G11) - requerido pelo OrcaSlicer
[firmware_retraction]
retract_length: 4.5        # Bowden: 4–6mm necessário para compensar folga do tubo PTFE
retract_speed: 50          # Bowden suporta 45–55mm/s sem triturar filamento
unretract_extra_length: 0.00
unretract_speed: 45

# Fan do hotend (PA0) - automático
[heater_fan hotend_fan]
pin: PA0
heater: extruder
heater_temp: 50        # liga quando o hotend passa de 50 °C
shutdown_speed: 0      # desliga quando o Klipper é encerrado

# Fan de peça (PA1) - controlado via M106/M107
[fan_generic part_fan]
pin: PA1
max_power: 1.0
kick_start_time: 0.5
shutdown_speed: 0

# Barra de LEDs (PA2) - liga/desliga manual
[output_pin leds]
pin: PA2
pwm: False             # LEDs só precisam ligar/desligar
shutdown_value: 0      # desliga quando o Klipper é encerrado
value: 0               # começa desligado

[gcode_macro LED_ON]
gcode:
    SET_PIN PIN=leds VALUE=1

[gcode_macro LED_OFF]
gcode:
    SET_PIN PIN=leds VALUE=0

[idle_timeout]
timeout: 1200      # 20 minutos sem movimento -> desligar motores

[gcode_arcs]
resolution: 0.10   # Suporte a G2/G3 (arcos)

[verify_heater extruder]
max_error: 120
check_gain_time: 50
hysteresis: 5
heating_gain: 2

[verify_heater heater_bed]
max_error: 120
check_gain_time: 60
hysteresis: 5
heating_gain: 2

[filament_switch_sensor RUNOUT]
pause_on_runout: true
runout_gcode:
    RESPOND TYPE=echo MSG="Filamento acabou! Pausando impressao..."
    PAUSE
insert_gcode:
    RESPOND TYPE=echo MSG="Filamento inserido."
event_delay: 3.0
pause_delay: 0.5
switch_pin: ^!PB14

[pause_resume]
[display_status]

# ==================== MACROS DE IMPRESSÃO ====================
# No fatiador (OrcaSlicer), configure o G-code de inicio da maquina com:
#   PRINT_START BED={bed_temperature_initial_layer_single} EXTRUDER={nozzle_temperature_initial_layer[0]} XMIN={first_layer_print_min[0]} YMIN={first_layer_print_min[1]} XMAX={first_layer_print_max[0]} YMAX={first_layer_print_max[1]}
# Os parametros XMIN/YMIN/XMAX/YMAX enviam a area exata do objeto para o nivelamento adaptativo.

[gcode_macro PRINT_START]
description: Rotina completa de inicio de impressao
gcode:
    {% set T_BED      = params.BED|default(60)|float %}
    {% set T_EXTRUDER = params.EXTRUDER|default(200)|float %}
    {% set XMIN = params.XMIN|default(-1)|float %}
    {% set YMIN = params.YMIN|default(-1)|float %}
    {% set XMAX = params.XMAX|default(-1)|float %}
    {% set YMAX = params.YMAX|default(-1)|float %}

    RESPOND TYPE=echo MSG="PRINT_START: BED={T_BED} EXT={T_EXTRUDER} XMIN={XMIN} YMIN={YMIN} XMAX={XMAX} YMAX={YMAX}"
    M83                         # Modo RELATIVO — OBRIGATORIO para OrcaSlicer (padrão do slicer é M83)
    G92 E0                      # Zera posicao do extrusor
    LED_ON]                     # Liga Barra de Leds

    M117 Aquecendo cama...
    M140 S{T_BED}
    M104 S150                   # Bico parcial: evita gotejamento durante homing
    M190 S{T_BED}               # Aguarda cama atingir temperatura

    M117 Homeando eixos...
    G28

    M117 Nivelando gantry (4x Z)...
    Z_TILT_ADJUST               # Nivelar os 4 motores Z independentes
    G28 Z                       # Re-home Z apos ajuste do tilt

    M117 Nivelando cama...
    BED_MESH_CALIBRATE_ADAPTIVE XMIN={XMIN} YMIN={YMIN} XMAX={XMAX} YMAX={YMAX}

    M117 Aquecendo bico...
    M109 S{T_EXTRUDER}          # Aguarda bico atingir temperatura de impressao

    M117 Limpando bico...
    PURGE_NOZZLE

    G92 E0                      # Reseta E=0 apos purga — estado limpo para o slicer
    M83                         # Modo RELATIVO — obrigatorio para OrcaSlicer

    M117 Imprimindo...

[gcode_macro PURGE_NOZZLE]
description: Linha de purga na parte frontal da impressora (Y=2)
gcode:
    M83                         # Modo RELATIVO — compativel com PRINT_START e OrcaSlicer
    G90                         # Coordenadas absolutas XYZ
    G1 Z5 F3000                 # Sobe Z para movimentacao segura
    G1 X5 Y2 F6000              # Vai para frente-esquerda
    G1 Z0.3 F600                # Desce para altura de purga
    G92 E0                      # Zera extrusor antes de purgar
    G1 X180 Y2 Z0.35 E15 F1200  # Linha de purga da esquerda para direita - Era 12
    G1 X10 Y2 Z0.5 E15 F1200    # Avanca sem extrudar (corta o fio)
    G92 E0                      # Zera extrusor apos purga
    G1 E-1.5 F800               # Retrai 1.5mm — libera pressao e evita gotejamento no travel
    G1 Z2 F3000                 # Sobe Z com filamento retraido
    G1 Y20 F6000                # Afasta da linha de purga
    G92 E0                      # Zera E final — slicer recebe E=0 limpo

# -------- Nivelamento adaptativo — sonda apenas a area do objeto --------
# Prioridade: 1) exclude_object (Label objects ativo no slicer)
#             2) Parametros XMIN/YMIN/XMAX/YMAX passados pelo PRINT_START
#             3) Nivelamento completo (fallback)
[gcode_macro BED_MESH_CALIBRATE_ADAPTIVE]
description: Nivela apenas a area do objeto
gcode:
    {% set margin = 5.0 %}
    {% set xmin_p  = params.XMIN|default(-1)|float %}
    {% set ymin_p  = params.YMIN|default(-1)|float %}
    {% set xmax_p  = params.XMAX|default(-1)|float %}
    {% set ymax_p  = params.YMAX|default(-1)|float %}
    {% set objs    = printer.exclude_object.objects %}
    {% set cfg     = printer.configfile.settings.bed_mesh %}
    {% set bx1     = cfg.mesh_min[0] | float %}
    {% set by1     = cfg.mesh_min[1] | float %}
    {% set bx2     = cfg.mesh_max[0] | float %}
    {% set by2     = cfg.mesh_max[1] | float %}

    {% if objs | length > 0 %}
        # --- Fonte 1: exclude_object (Label objects ativo) ---
        {% set ns = namespace(x1=9999.0, y1=9999.0, x2=-9999.0, y2=-9999.0) %}
        {% for obj in objs %}
            {% for pt in obj.polygon %}
                {% if pt[0] < ns.x1 %}{% set ns.x1 = pt[0] %}{% endif %}
                {% if pt[1] < ns.y1 %}{% set ns.y1 = pt[1] %}{% endif %}
                {% if pt[0] > ns.x2 %}{% set ns.x2 = pt[0] %}{% endif %}
                {% if pt[1] > ns.y2 %}{% set ns.y2 = pt[1] %}{% endif %}
            {% endfor %}
        {% endfor %}
        {% set ax1 = [ns.x1 - margin, bx1] | max %}
        {% set ay1 = [ns.y1 - margin, by1] | max %}
        {% set ax2 = [ns.x2 + margin, bx2] | min %}
        {% set ay2 = [ns.y2 + margin, by2] | min %}
        {% set px  = [((ax2 - ax1) / (bx2 - bx1) * 5) | round | int, 3] | max %}
        {% set py  = [((ay2 - ay1) / (by2 - by1) * 5) | round | int, 3] | max %}
        RESPOND TYPE=echo MSG="Mesh adaptativo (exclude_object): ({ ax1 | round | int },{ ay1 | round | int })->({ ax2 | round | int },{ ay2 | round | int }) { px }x{ py } pontos"
        BED_MESH_CALIBRATE MESH_MIN={ ax1 },{ ay1 } MESH_MAX={ ax2 },{ ay2 } PROBE_COUNT={ px },{ py }

    {% elif xmin_p >= 0 and ymin_p >= 0 and xmax_p >= 0 and ymax_p >= 0 %}
        # --- Fonte 2: parametros do slicer (XMIN/YMIN/XMAX/YMAX) ---
        {% set ax1 = [xmin_p - margin, bx1] | max %}
        {% set ay1 = [ymin_p - margin, by1] | max %}
        {% set ax2 = [xmax_p + margin, bx2] | min %}
        {% set ay2 = [ymax_p + margin, by2] | min %}
        {% set px  = [((ax2 - ax1) / (bx2 - bx1) * 5) | round | int, 3] | max %}
        {% set py  = [((ay2 - ay1) / (by2 - by1) * 5) | round | int, 3] | max %}
        RESPOND TYPE=echo MSG="Mesh adaptativo (slicer bounds): ({ ax1 | round | int },{ ay1 | round | int })->({ ax2 | round | int },{ ay2 | round | int }) { px }x{ py } pontos"
        BED_MESH_CALIBRATE MESH_MIN={ ax1 },{ ay1 } MESH_MAX={ ax2 },{ ay2 } PROBE_COUNT={ px },{ py }

    {% else %}
        # --- Fonte 3: fallback nivelamento completo ---
        RESPOND TYPE=echo MSG="Sem dados de area — nivelamento completo da mesa"
        BED_MESH_CALIBRATE
    {% endif %}

[gcode_macro PRINT_END]
description: Rotina de fim de impressao
gcode:
    M400                        # Aguarda fim de todos os movimentos
    G92 E0                      # Zera extrusor
    G1 E-5 F1800                # Retrai 5mm de filamento
    G91                         # Coordenadas relativas
    G1 Z15 F3000                # Sobe Z 15mm
    G90                         # Coordenadas absolutas
    G1 X220 Y220 F6000          # Move cabeca para frente (acesso facil a peca)
    M104 S0                     # Desliga aquecimento do bico
    M140 S0                     # Desliga aquecimento da cama
    M107                        # Desliga ventilador da peca
    TIMELAPSE_RENDER            # Renderiza o video do timelapse
    LED_OFF                     # Deliga Barra de les
    M84                         # Desliga motores
    M117 Impressao concluida!

# ---- Interceptores: evitam que o slicer sobrescreva PA com valor alto ----
# OrcaSlicer pode enviar SET_PRESSURE_ADVANCE via filament start G-code
[gcode_macro SET_PRESSURE_ADVANCE]
rename_existing: SET_PRESSURE_ADVANCE_ORIG
gcode:
    {% set adv = params.ADVANCE|default(0)|float %}
    {% set st  = params.SMOOTH_TIME|default(0.04)|float %}
    {% if adv > 0.15 %}
        RESPOND TYPE=echo MSG="PA interceptado: ADVANCE={adv} muito alto para Bowden -> ignorado (use TUNING_TOWER para calibrar)"
    {% else %}
        SET_PRESSURE_ADVANCE_ORIG ADVANCE={adv} SMOOTH_TIME={st}
    {% endif %}

# Marlin M900 -> Klipper (compatibilidade)
[gcode_macro M900]
description: Compatibilidade Marlin; converte K para Klipper PA
gcode:
    {% set k = params.K|default(0)|float %}
    {% if k > 0.15 %}
        RESPOND TYPE=echo MSG="M900 interceptado: K={k} alto demais para Bowden -> ignorado"
    {% elif k >= 0 %}
        SET_PRESSURE_ADVANCE_ORIG ADVANCE={k}
    {% endif %}

# RepRap M572 -> Klipper (compatibilidade)
[gcode_macro M572]
description: Compatibilidade RepRap; converte S para Klipper PA
gcode:
    {% set s = params.S|default(0)|float %}
    {% if s > 0.15 %}
        RESPOND TYPE=echo MSG="M572 interceptado: S={s} alto demais para Bowden -> ignorado"
    {% elif s >= 0 %}
        SET_PRESSURE_ADVANCE_ORIG ADVANCE={s}
    {% endif %}

# -------------------- Display / LEDs --------------------
[board_pins]
aliases:
    EXP1_1=PB2,  EXP1_3=PE11, EXP1_5=PD9,  EXP1_7=PE15, EXP1_9=<GND>,
    EXP1_2=PE10, EXP1_4=PD10, EXP1_6=PD8,  EXP1_8=PE7,  EXP1_10=<5V>,
    EXP2_1=PA6,  EXP2_3=PE9,  EXP2_5=PE8,  EXP2_7=PD13, EXP2_9=<GND>,
    EXP2_2=PA5,  EXP2_4=PA4,  EXP2_6=PA7,  EXP2_8=<RST>, EXP2_10=<3.3v>

[display]
lcd_type: uc1701
cs_pin: EXP1_3
a0_pin: EXP1_4
rst_pin: EXP1_5
contrast: 63
encoder_pins: ^EXP2_5, ^EXP2_3
click_pin: ^!EXP1_2
spi_software_miso_pin: EXP2_1
spi_software_mosi_pin: EXP2_6
spi_software_sclk_pin: EXP2_2

[output_pin beeper]
pin: EXP1_1

[neopixel fysetc_mini12864]
pin: EXP1_6
chain_count: 3
color_order: RGB
initial_RED: 1.0
initial_GREEN: 1.0
initial_BLUE: 0.0

[input_shaper]
shaper_type_x: mzv
shaper_freq_x: 45
shaper_type_y: mzv
shaper_freq_y: 40

[include KAMP_Settings.cfg]

