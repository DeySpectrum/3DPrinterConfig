[include shell_command.cfg]
[include ./KAMP/Adaptive_Meshing.cfg]       # Adaptive meshing configuration.
[include ./KAMP/Line_Purge.cfg]             # Adaptive line purging configuration.
[include mainsail.cfg]
[include ./KAMP/KAMP_Settings.cfg]
[include timelapse.cfg]
[exclude_object]

# ============================================================
#  MKS SKIPR (STM32F407) + CoreXY + Bowden + Klipper
#  Ajustado para 4 motores Z independentes (TR8x8)
# ============================================================

[mcu]
serial: /dev/ttyS0
restart_method: command
#baud: 250000

# -------------------- X --------------------
[stepper_x]
step_pin: PC14
dir_pin: !PC13
enable_pin: !PC15
microsteps: 16
rotation_distance: 40
full_steps_per_rotation: 200
endstop_pin: !PA14
position_min: 0 
position_endstop: 0
position_max: 230
homing_speed: 80                 # reduzido de 150 -> 80 (mais seguro)
homing_retract_dist: 5
step_pulse_duration: 0.000008

[tmc2209 stepper_x]
uart_pin: PE6
run_current: 1.5                # reduzido para proteger motores/placa - Eera todos os drivers 1.8
hold_current: 0.5
interpolate: true
stealthchop_threshold: 0        # usar stealthChop até ~80mm/s Era 80

# -------------------- Y --------------------
[stepper_y]
step_pin: PE5
dir_pin: !PE4
enable_pin: !PD14
microsteps: 16
rotation_distance: 40
full_steps_per_rotation: 200
endstop_pin: !PA15
position_min: 0
position_endstop: 0
position_max: 230
homing_speed: 80                 # reduzido de 150 -> 80 (mais seguro)
homing_retract_dist: 5
step_pulse_duration: 0.000008

[tmc2209 stepper_y]
uart_pin: PE3
run_current: 1.5
hold_current: 0.5
interpolate: true
stealthchop_threshold: 0

# -------------------- Z (gantry principal) --------------------
[stepper_z]
step_pin: PE1
dir_pin: PE0 
enable_pin: !PE2
microsteps: 16 #Era 16
rotation_distance: 8            # TR8x8 -> 8 mm por rotação
full_steps_per_rotation: 200
# Removido gear_ratio (usando lead screw direto TR8x8)
endstop_pin: probe:z_virtual_endstop
position_max: 280
position_min: -5  #Era -5
homing_speed: 5   #Era 8
second_homing_speed: 2

[tmc2209 stepper_z]
uart_pin: PB7
run_current: 1.5                #1.0 corrente reduzida para Zs
hold_current: 0.5               #0.7
interpolate: true
stealthchop_threshold: 0

# Z1 (motor Z 2)
[stepper_z1]
step_pin: PD6
dir_pin: !PD5
enable_pin: !PD7
microsteps: 16
rotation_distance: 8
full_steps_per_rotation: 200

[tmc2209 stepper_z1]
uart_pin: PD4
run_current: 1.5
hold_current: 0.5
interpolate: true
stealthchop_threshold: 0

# Z2 (motor Z 3)
[stepper_z2]
step_pin: PD2
dir_pin: PD1
enable_pin: !PD3
microsteps: 16
rotation_distance: 8
full_steps_per_rotation: 200

[tmc2209 stepper_z2]
uart_pin: PD0
run_current: 1.5
hold_current: 0.6
interpolate: true
stealthchop_threshold: 0

# Z3 (motor Z 4)
[stepper_z3]
step_pin: PC7
dir_pin: PC6
enable_pin: !PC8
microsteps: 16
rotation_distance: 8
full_steps_per_rotation: 200

[tmc2209 stepper_z3]
uart_pin: PD15
run_current: 1.5
hold_current: 0.5
interpolate: true
stealthchop_threshold: 0

# -------------------- Extrusor --------------------
[extruder]
step_pin: PB5
dir_pin: !PB4
enable_pin: !PB6
microsteps: 16
rotation_distance: 32.5        #Era 32.582 Bondtech 5mm drive gears (mantido)
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
min_temp: 0
max_temp: 330
heater_pin: PB0  
sensor_type: Generic 3950     #NTC 100K MGB18-104F39050L32 - O Valor do resistor era 100k
sensor_pin: PC0  #Era PC1 Ers PC2
max_power: 1.0
min_extrude_temp: 160              # mantido (PLA 160–180)

# >>> ADIÇÃO OBRIGATÓRIA <<<
control: pid
pid_kp: 37.095
pid_ki: 2.114
pid_kd: 162.752
# <<< ADIÇÃO OBRIGATÓRIA >>>

pressure_advance: 0.030            # ponto de partida Bowden
pressure_advance_smooth_time: 0.08
max_extrude_cross_section: 20.0
max_extrude_only_distance: 50.0
max_extrude_only_velocity: 120
max_extrude_only_accel: 2000
step_pulse_duration: 0.000004

[tmc2209 extruder]
uart_pin: PB3
run_current: 1.5
hold_current: 0.5
interpolate: true
stealthchop_threshold: 0

[gcode_macro CHECK_TMC_TEMP]
description: Verifica se algum driver TMC2209 está aquecendo
gcode:
    {% set drivers = [
        "stepper_x",
        "stepper_y",
        "stepper_z",
        "stepper_z1",
        "stepper_z2",
        "stepper_z3",
        "extruder"
    ] %}

    {% for drv in drivers %}
        {% set name = "tmc2209 " ~ drv %}
        {% if printer[name] is defined %}
            {% set s = printer[name].drv_status %}
            
            {% if s.ot == 1 %}
                {action_respond_error("🔥 DRIVER " ~ drv ~ " SUPER AQUECIDO (OT)!")}
            {% elif s.otpw == 1 %}
                {action_respond_info("⚠ DRIVER " ~ drv ~ " AQUECENDO (OTPW)")}
            {% endif %}
        {% endif %}
    {% endfor %}

[delayed_gcode TMC_MONITOR]
initial_duration: 10
gcode:
    CHECK_TMC_TEMP
    UPDATE_DELAYED_GCODE ID=TMC_MONITOR DURATION=30
    
[verify_heater extruder]
max_error: 120
check_gain_time: 50
hysteresis: 5
heating_gain: 2

# -------------------- Mesa Aquecida --------------------
[heater_bed]
heater_pin: PD12
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: PC2 # Era PC0
max_power: 1.0
control: pid
pid_kp: 47.0
pid_ki: 0.5
pid_kd: 300.0
min_temp: 0
max_temp: 200

# -------------------- Ventiladores --------------------
[fan]                 # FAN0 - peça
pin: PA2

[heater_fan fan1]    # FAN1 - hotend
pin: PA1
shutdown_speed: 1

[heater_fan fan2]    # FAN2 - placa/controlador
pin: PA0
shutdown_speed: 1

# -------------------- Tempo ocioso --------------------
[idle_timeout]
timeout: 1200 #Era 3600

# -------------------- Home seguro --------------------
[safe_z_home]
home_xy_position: 115,115
speed: 250   #350
z_hop: 10
z_hop_speed: 10

# -------------------- Malha da mesa --------------------
[bed_mesh]
speed: 120
horizontal_move_z: 5
mesh_min: 25,11
mesh_max: 215,215
probe_count: 5,5
algorithm: lagrange
fade_start: 1 #Era 5.5
fade_end: 10   #Era 60
#algorithm: bicubic
#mesh_pps: 5,5
#bicubic_tension: 0.8

# [gcode_macro Z_TILT_ADJUST]
# gcode:
#      Z_TILT_ADJUST
#      SAVE_CONFIG

[gcode_macro BED_MESH_CALIBRATE_FULL]
gcode:
    G28
    Z_TILT_ADJUST
    BED_MESH_CALIBRATE
    SAVE_CONFIG
    
# -------------------- Probe --------------------
[probe]
pin: !PB15
x_offset: -6
y_offset: 6
z_offset: 1.8            # Mudei para 0.0 — calibre o offset real com HELP_CALIBRATE/Z-offset
speed: 10.0
samples: 2
samples_result: median
sample_retract_dist: 5.0
samples_tolerance: 0.05
samples_tolerance_retries: 1

# -------------------- Cinemática / limites --------------------
[printer]
kinematics: corexy
max_velocity: 500            # ajustado para segurança (era 450)
max_accel: 5000              # reduzido de 3500 -> 2500
max_z_velocity: 30           # Eraq 15
max_z_accel: 100
square_corner_velocity: 4.0 # reduzido (era 18.0)

[gcode_arcs]
# Suporte a G2/G3 no Klipper
resolution: 0.10   # 0.05–0.20 mm é bom; menor = mais suave

# -------------------- Runout --------------------
[filament_switch_sensor RUNOUT]
pause_on_runout: true
runout_gcode:
   G1 E10 F5000
   G1 E-100 F5000
insert_gcode:
event_delay: 3.0
pause_delay: 0.5
switch_pin: ^!PB14

# -------------------- Retração por firmware --------------------
[firmware_retraction]
# PLA / ABS / PETG (pontos de partida)
retract_length: 5.0        # 2.5 é curto p/ Bowden; use 3.0–5.0
retract_speed: 30          # 40–55 mm/s (sem moer o filamento)
unretract_extra_length: 0.00  # ajuda a evitar “zits”; 0.0 a -0.15
unretract_speed: 25        # um pouco mais lento que o retract (25–40)

# OrcaSlicer — G-code de início da máquina:
# START_PRINT BED_TEMP={bed_temperature_initial_layer_single} EXTRUDER_TEMP={nozzle_temperature_initial_layer[0]} X_MIN={first_layer_print_min[0]} Y_MIN={first_layer_print_min[1]} X_MAX={first_layer_print_max[0]} Y_MAX={first_layer_print_max[1]}
[gcode_macro START_PRINT]
description: Aquece mesa → home → Z_TILT → mesh adaptativo → aquece bico → purga → imprime
gcode:
  {% set bed  = params.BED_TEMP      | default(60)  | float %}
  {% set extr = params.EXTRUDER_TEMP | default(200) | float %}
  {% set x_min = params.X_MIN | default(25)  | float %}
  {% set y_min = params.Y_MIN | default(11)  | float %}
  {% set x_max = params.X_MAX | default(215) | float %}
  {% set y_max = params.Y_MAX | default(215) | float %}
  {% set margin = 5.0 %}

  M83                              # Extrusor modo relativo
  G90                              # Coordenadas absolutas

  # ---------- 1. AQUECIMENTO INICIAL ----------
  M117 Aquecendo mesa...
  M140 S{bed}                      # Mesa → temperatura alvo (sem esperar)
  M104 S150                        # Bico → 150 °C (evita gotejamento durante homing)

  # ---------- 2. HOME ----------
  M117 Homeando eixos...
  G28

  # ---------- 3. AGUARDA MESA ----------
  M117 Aguardando mesa {bed}C...
  M190 S{bed}                      # Aguarda mesa atingir temperatura alvo

  # ---------- 4. NIVELAMENTO DO GANTRY (Z_TILT) ----------
  M117 Nivelando gantry (Z_TILT)...
  Z_TILT_ADJUST
  G28 Z                            # Re-home Z após ajuste do tilt

  # ---------- 5. MALHA ADAPTATIVA NA ÁREA DO OBJETO ----------
  M117 Mapeando mesa...
  BED_MESH_CLEAR
  {% set cfg  = printer.configfile.settings.bed_mesh %}
  {% set bx1  = cfg.mesh_min[0] | float %}
  {% set by1  = cfg.mesh_min[1] | float %}
  {% set bx2  = cfg.mesh_max[0] | float %}
  {% set by2  = cfg.mesh_max[1] | float %}
  {% set xs = [x_min - margin, bx1] | max %}
  {% set ys = [y_min - margin, by1] | max %}
  {% set xe = [x_max + margin, bx2] | min %}
  {% set ye = [y_max + margin, by2] | min %}
  BED_MESH_CALIBRATE AREA_START={xs},{ys} AREA_END={xe},{ye}

  # ---------- 6. AGUARDA BICO NA TEMPERATURA DE IMPRESSÃO ----------
  M117 Aquecendo bico {extr}C...
  M109 S{extr}                     # Aguarda bico atingir temperatura alvo

  # ---------- 7. LINHA DE PURGA ----------
  M117 Purgando bico...
  G1 Z5 F6000
  G1 X10 Y5 F12000
  G1 Z0.32 F1500
  G92 E0
  G1 X{ printer.toolhead.axis_maximum.x - 10 } E16 F1800
  G1 Y6 F12000
  G1 X10 E12 F1800
  G92 E0
  G1 Z0.4 F1800

  M117 Imprimindo...

[gcode_macro END_PRINT]
description: Fim de impressão seguro
gcode:
  G91
  G1 Z10 F3000
  G90
  G1 X{printer.toolhead.axis_maximum.x - 5} Y{printer.toolhead.axis_maximum.y - 5} F12000
  M104 S0
  M140 S0
  M106 S0
  M84


# Intercepta BED_MESH_PROFILE da UI e redireciona default -> Malha_01
[gcode_macro BED_MESH_PROFILE]
rename_existing: BED_MESH_PROFILE_ORIG
gcode:
  {% set rp = rawparams|trim %}
  {% set rp_norm = rp|lower|replace(" ", "") %}
  # aceita "LOAD name=default" (sem =) e "LOAD=default"
  {% if rp_norm == "loadname=default" or rp_norm == "load=default" %}
    {action_respond_info("Intercept: BED_MESH_PROFILE LOAD default -> Malha_01")}
    BED_MESH_PROFILE_ORIG LOAD=Malha_01
  {% else %}
    BED_MESH_PROFILE_ORIG {rawparams}
  {% endif %}

# --- Clamp de Pressure Advance vindo do G-code ---
[gcode_macro SET_PRESSURE_ADVANCE]
rename_existing: SET_PRESSURE_ADVANCE_ORIG
gcode:
  {% set adv = params.ADVANCE|default(0)|float %}
  {% set st  = params.SMOOTH_TIME|default(0.06)|float %}
  {% if adv > 1.0 or adv < 0 %}
    RESPOND TYPE=echo MSG="Clamp SET_PRESSURE_ADVANCE: pedido ADVANCE={adv} -> usando 0.030"
    {% set adv = 0.05 %}
  {% endif %}
  SET_PRESSURE_ADVANCE_ORIG ADVANCE={adv} SMOOTH_TIME={st}

# Marlin M900 -> Klipper (clamp)
[gcode_macro M900]
description: Compatibilidade; limita K para evitar taxas absurdas
gcode:
  {% set k = params.K|default(0)|float %}
  {% if k > 1.0 %}
    RESPOND TYPE=echo MSG="M900 interceptado: K={k} -> clamp para 0.05"
    {% set ksafe = 0.05 %}
  {% else %}
    {% set ksafe = k %}
  {% endif %}
  SET_PRESSURE_ADVANCE ADVANCE={ksafe}

# RepRap M572 -> Klipper (clamp)
[gcode_macro M572]
description: Compatibilidade; limita S
gcode:
  {% set s = params.S|default(0)|float %}
  {% if s > 1.0 %}
    RESPOND TYPE=echo MSG="M572 interceptado: S={s} -> clamp para 0.05"
    {% set ssafe = 0.05 %}
  {% else %}
    {% set ssafe = s %}
  {% endif %}
  SET_PRESSURE_ADVANCE ADVANCE={ssafe}

[pause_resume]
[display_status]

# -------------------- G32 usando Z_TILT --------------------
[gcode_macro G32]
description: Nivelamento/ajuste do pórtico e home
gcode:
    BED_MESH_CLEAR
    G28
    Z_TILT_ADJUST
    G28

[gcode_macro NOZZLE_CLEAN]
description: Limpeza do bico (wipe em zig-zag)
variable_x: 5.0
variable_y: 5.0
variable_w: 35.0
variable_h: 10.0
variable_passes: 4
variable_z: 0.25
variable_e_per_pass: 0.0      # <-- padrão: NÃO extrusar no wipe
variable_f_travel: 9000
variable_f_line: 1500
gcode:
  {% set x = printer["gcode_macro NOZZLE_CLEAN"].x|float %}
  {% set y = printer["gcode_macro NOZZLE_CLEAN"].y|float %}
  {% set w = printer["gcode_macro NOZZLE_CLEAN"].w|float %}
  {% set h = printer["gcode_macro NOZZLE_CLEAN"].h|float %}
  {% set p = printer["gcode_macro NOZZLE_CLEAN"].passes|int %}
  {% set z = printer["gcode_macro NOZZLE_CLEAN"].z|float %}
  {% set e = printer["gcode_macro NOZZLE_CLEAN"].e_per_pass|float %}
  {% set fT = printer["gcode_macro NOZZLE_CLEAN"].f_travel|int %}
  {% set fL = printer["gcode_macro NOZZLE_CLEAN"].f_line|int %}

  # Só extrusa se já estiver >= min_extrude_temp
  {% set min_ext = printer.configfile.settings.extruder.min_extrude_temp|default(170)|float %}
  {% set can_extrude = (printer.extruder.temperature|float) >= (min_ext - 1.0) %}
  {% set e_amt = e if can_extrude else 0.0 %}

  G91
  G1 Z5 F3000
  G90
  G1 X{ x } Y{ y } F{ fT }
  G1 Z{ z } F1200
  M83
  {% for i in range(p) %}
    {% if (i % 2) == 0 %}
      G1 X{ x + w } E{ e_amt } F{ fL }
    {% else %}
      G1 X{ x } E{ e_amt } F{ fL }
    {% endif %}
    {% if i < (p-1) %}
      G1 Y{ y + (h*(i+1)/p) } F{ fL }
    {% endif %}
  {% endfor %}
  G92 E0
  G1 Z3 F1500

# -------------------- Parafusos / Tilt --------------------
# [bed_screws]
# screw1: 100, 50
# screw1_fine_adjust: 0, 0
# screw2: 100, 150
# screw2_fine_adjust: 300, 300
# screw3: 150, 100
# screw3_fine_adjust: 0, 100

#------------------------------------------------------
# NIVELAMENTO AUTOMÁTICO Z_TILT (4 MOTORES)
#------------------------------------------------------
[z_tilt]
# Posições físicas dos 4 fusos/motores Z
z_positions:
    25, 10      # Frente esquerda (Z0)
    228, 10     # Frente direita (Z1)
    228, 225    # Trás direita (Z2)
    25, 225     # Trás esquerda (Z3)

# Pontos onde o probe fará as medições (em cima da mesa)
points:
    25, 10
    228, 10
    228, 225
    25, 225

speed: 120  #Era 120
horizontal_move_z: 5
retries: 5
retry_tolerance: 0.05

[screws_tilt_adjust]
screw1: 25, 10
screw1_name: Frontal esquerdo
screw2: 228, 10
screw2_name: Frontal direito
screw3: 25, 225
screw3_name: Traseiro esquerdo
screw4: 228, 225
screw4_name: Traseiro direito

horizontal_move_z: 10
speed: 120
screw_thread: CW-M3

[gcode_macro CALCULO_DE_PARAFUSO]
gcode:
    SCREWS_TILT_CALCULATE

# -------------------- Display / LEDs --------------------
[board_pins]
aliases:
    EXP1_1=PB2,  EXP1_3=PE11, EXP1_5=PD9,  EXP1_7=PE15, EXP1_9=<GND>,
    EXP1_2=PE10, EXP1_4=PD10, EXP1_6=PD8,  EXP1_8=PE7,  EXP1_10=<5V>,
    EXP2_1=PA6,  EXP2_3=PE9,  EXP2_5=PE8,  EXP2_7=PD13, EXP2_9=<GND>,
    EXP2_2=PA5,  EXP2_4=PA4,  EXP2_6=PA7,  EXP2_8=<RST>, EXP2_10=<3.3v>

[display]
lcd_type: uc1701
cs_pin: EXP1_3
a0_pin: EXP1_4
rst_pin: EXP1_5
contrast: 63
encoder_pins: ^EXP2_5, ^EXP2_3
click_pin: ^!EXP1_2
spi_software_miso_pin: EXP2_1
spi_software_mosi_pin: EXP2_6
spi_software_sclk_pin: EXP2_2

[output_pin beeper]
pin: EXP1_1

[neopixel fysetc_mini12864]
pin: EXP1_6
chain_count: 3
color_order: RGB
initial_RED: 1.0
initial_GREEN: 1.0
initial_BLUE: 0.0

# -------------------- Host MCU / Shaper --------------------
# [mcu rpi] desabilitado — necessário apenas se ADXL345 estiver conectado ao GPIO do host.
# Para reabilitar: instale klipper-mcu no host e descomente as linhas abaixo.
#[mcu rpi]
#serial: /tmp/klipper_host_mcu

[input_shaper]
shaper_freq_x: 68.4
shaper_type_x: mzv
shaper_freq_y: 45.6
shaper_type_y: mzv

[virtual_sdcard]
path: /home/mks/printer_data/gcodes

# Timelapse (um único delayed_gcode)
[delayed_gcode _INIT_TIMELAPSE_CHECK_TIME]
initial_duration: 1
gcode: SET_GCODE_VARIABLE MACRO=TIMELAPSE_TAKE_FRAME VARIABLE=check_time VALUE=0.5

