#### crowsnest.conf
#### This is the default config after installation.
#### It is also used as the default config in MainsailOS.
#### For details on how to configure this to your needs, see:
#### https://github.com/mainsail-crew/crowsnest/blob/master/README.md


#####################################################################
####                                                            #####
####      Information about ports and according URL's           #####
####                                                            #####
#####################################################################
####                                                            #####
####    Port 8080 equals /webcam/?action=[stream/snapshot]      #####
####    Port 8081 equals /webcam2/?action=[stream/snapshot]     #####
####    Port 8082 equals /webcam3/?action=[stream/snapshot]     #####
####    Port 8083 equals /webcam4/?action=[stream/snapshot]     #####
####                                                            #####
####    Note: These ports are default for most Mainsail         #####
####    installations. Using any other port would involve       #####
####    changing the proxy configuration or using URLs          #####
####    with the specific port like                             #####
####    http://<ip>:<port>/?action=[stream/snapshot]            #####
####                                                            #####
#####################################################################
####    RTSP Stream URL: ( if enabled and supported )           #####
####    rtsp://<ip>:<rtsp_port>/stream.h264                     #####
#####################################################################


[crowsnest]
log_path: /home/mks/printer_data/logs/crowsnest.log
log_level: verbose                      # Valid Options are quiet/verbose/debug
delete_log: false                       # Deletes log on every restart, if set to true
no_proxy: false                         # If set to true, no reverse proxy is required. Only change this, if you know what you are doing.

[cam 1]
mode: ustreamer                         # ustreamer - Provides mjpg and snapshots. (All devices)
                                        # camera-streamer - Provides webrtc, mjpg and snapshots. (rpi + Raspi OS based only)
enable_rtsp: false                      # If camera-streamer is used, this enables also usage of an rtsp server
port: 8080                              # HTTP/MJPG Stream/Snapshot Port
device: /dev/v4l/by-id/usb-UnionImage_Co._Ltd_CCX2F3298_1234567890-video-index0
resolution: 1920x1080                   # widthxheight format  - Era 640x480 - 1920x1080 - 1280x720 - Ultima = 3072x1728
max_fps: 15                             # If Hardware Supports this it will be forced, otherwise ignored/coerced. 
#custom_flags:                          # You can run the Stream Services with custom flags.
#v4l2ctl:                               # Add v4l2-ctl parameters to setup your camera, see Log what your cam is capable of.

custom_flags: > 
    --encoder hw             # Habilita encoder por hardware (melhor qualidade)
    --quality 80             # Qualidade da compressão (0–100)
    --resolution 1920x1080   # Garante a resolução - 1280x720 - Ultima= 3072x1728
    --desired-fps 15         # Alvo do FPS - Era = 20
    --drop-same-frames 25    # Reduz lag eliminando frames repetidos
    --slowdown 0             # Evita reduzir FPS automaticamente

# Ajustes da câmera — MAIS NITIDEZ E CORREÇÃO DE EXPOSIÇÃO
v4l2ctl: >
    -c brightness=128
    -c contrast=128
    -c saturation=140
    -c sharpness=130
    -c exposure_auto=1        # Modo manual
    -c exposure_absolute=120  # Ajuste conforme iluminação
    -c gain=0                 # Reduz ruído
